<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MMCORE multimodal generation thumbnail</title>
  <desc id="desc">Animated text and image signals align into a shared latent core for image generation and editing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.45" stop-color="#eefbf8"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.52" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .label { font: 600 30px Inter, Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 22px Inter, Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 18px Inter, Arial, sans-serif; fill: #0f766e; letter-spacing: 0; }
      .signal { stroke-dasharray: 18 18; animation: flow 2.8s linear infinite; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; transform-origin: center; }
      .float-a { animation: floatA 4.4s ease-in-out infinite; }
      .float-b { animation: floatB 4.8s ease-in-out infinite; }
      .float-c { animation: floatC 5.2s ease-in-out infinite; }
      @keyframes flow { to { stroke-dashoffset: -72; } }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.92; }
        50% { transform: scale(1.04); opacity: 1; }
      }
      @keyframes floatA { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      @keyframes floatB { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(12px); } }
      @keyframes floatC { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <path d="M130 548 C310 458, 430 560, 600 474 S900 342, 1078 436" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.18"/>
  <path d="M110 154 C294 238, 390 104, 584 188 S888 244, 1086 126" fill="none" stroke="#0f766e" stroke-width="3" opacity="0.14"/>

  <g filter="url(#softShadow)">
    <rect x="76" y="106" width="268" height="154" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <text x="112" y="164" class="tiny">TEXT PROMPT</text>
    <text x="112" y="204" class="small">"edit the scene"</text>
  </g>

  <g class="float-a" filter="url(#softShadow)">
    <rect x="92" y="386" width="252" height="174" rx="18" fill="#ffffff" stroke="#ccfbf1"/>
    <rect x="124" y="428" width="82" height="82" rx="12" fill="#ccfbf1"/>
    <circle cx="164" cy="468" r="24" fill="#14b8a6" opacity="0.68"/>
    <path d="M220 500 L278 436 L320 500 Z" fill="#f59e0b" opacity="0.82"/>
    <text x="124" y="532" class="tiny">REFERENCE IMAGE</text>
  </g>

  <path class="signal" d="M344 182 C430 190, 454 248, 510 296" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path class="signal" d="M344 472 C442 456, 462 386, 510 344" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.72"/>

  <g class="pulse" filter="url(#softShadow)">
    <circle cx="600" cy="330" r="124" fill="#ffffff"/>
    <circle cx="600" cy="330" r="104" fill="url(#core)" opacity="0.92"/>
    <circle cx="600" cy="330" r="68" fill="#ffffff" opacity="0.18"/>
    <text x="600" y="320" text-anchor="middle" style="font: 800 54px Inter, Arial, sans-serif; fill: #ffffff; letter-spacing: 0;">MMCORE</text>
    <text x="600" y="358" text-anchor="middle" style="font: 600 22px Inter, Arial, sans-serif; fill: #ecfeff; letter-spacing: 0;">aligned latent embeddings</text>
  </g>

  <path class="signal" d="M706 302 C796 232, 858 202, 930 196" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" opacity="0.72"/>
  <path class="signal" d="M706 360 C806 416, 858 468, 938 486" fill="none" stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.72"/>

  <g class="float-b" filter="url(#softShadow)">
    <rect x="930" y="106" width="210" height="180" rx="20" fill="#ffffff" stroke="#ccfbf1"/>
    <rect x="960" y="136" width="150" height="98" rx="12" fill="#ecfeff"/>
    <circle cx="1008" cy="180" r="25" fill="#14b8a6" opacity="0.82"/>
    <path d="M984 228 L1034 174 L1112 228 Z" fill="#f59e0b" opacity="0.86"/>
    <text x="960" y="260" class="tiny">GENERATION</text>
  </g>

  <g class="float-c" filter="url(#softShadow)">
    <rect x="920" y="402" width="230" height="162" rx="20" fill="#ffffff" stroke="#fed7aa"/>
    <rect x="954" y="436" width="62" height="62" rx="10" fill="#fef3c7"/>
    <rect x="1032" y="436" width="82" height="62" rx="10" fill="#ccfbf1"/>
    <path d="M986 516 C1038 486, 1068 554, 1120 510" fill="none" stroke="#0f766e" stroke-width="7" stroke-linecap="round"/>
    <text x="954" y="536" class="tiny">EDITING</text>
  </g>

  <text x="78" y="626" class="label">MultiModal COnnection with Representation Aligned Latent Embeddings</text>
</svg>
